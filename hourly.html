<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short-term Weather Forecast</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .widget-container {
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #4A90E2 0%, #5BBAFF 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        .current-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.4);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .current-emoji {
            font-size: 3em;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .current-details {
            text-align: right;
        }
        .temp {
            font-size: 2.2em;
            font-weight: 800;
            margin: 0;
        }
        .desc {
            font-size: 1em;
            font-weight: 600;
            text-transform: capitalize;
            margin: 0;
        }
        .loc {
            font-size: 0.9em;
            opacity: 0.9;
            margin: 0;
        }
        .forecast-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .forecast-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.9em;
        }
        .forecast-time {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .forecast-icon {
            font-size: 1.5em;
            margin-bottom: 4px;
        }
        .forecast-temp {
            font-weight: bold;
        }
        .error {
            color: #ffcccc;
            font-size: 0.9em;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="current-section">
            <div class="current-emoji" id="current-emoji">☀️</div>
            <div class="current-details">
                <p class="temp" id="current-temp">--°F</p>
                <p class="desc" id="current-desc">Loading...</p>
                <p class="loc" id="current-loc">Saratoga, CA</p>
            </div>
        </div>
        <div class="forecast-section" id="forecast-container">
            <!-- Forecast items injected here -->
        </div>
        <div class="error" id="error-msg"></div>
    </div>

    <script>
        const API_KEY = '1c47d4c7d6694de1731919721ad0d2a2';
        const UNITS = 'imperial';

        // Get location from URL parameters, fallback to Saratoga
        const params = new URLSearchParams(window.location.search);
        const LATITUDE = parseFloat(params.get('lat')) || 37.2639;
        const LONGITUDE = parseFloat(params.get('lon')) || -122.0233;
        const CITY_NAME = params.get('city') || 'Saratoga, CA';

        function getWeatherEmoji(weatherId, isDaytime) {
            if (weatherId >= 200 && weatherId < 300) return '⛈️';
            if (weatherId >= 300 && weatherId < 400) return '🌧️';
            if (weatherId >= 500 && weatherId < 600) return '🌧️';
            if (weatherId >= 600 && weatherId < 700) return '❄️';
            if (weatherId >= 700 && weatherId < 800) return '🌫️';
            if (weatherId === 800) return isDaytime ? '☀️' : '🌙';
            if (weatherId === 801) return '🌤️';
            if (weatherId === 802) return '⛅';
            if (weatherId === 803 || weatherId === 804) return '☁️';
            return '❓';
        }

        async function fetchWeather() {
            try {
                // Fetch Current
                const currentUrl = `https://api.openweathermap.org/data/2.5/weather?lat=${LATITUDE}&lon=${LONGITUDE}&appid=${API_KEY}&units=${UNITS}`;
                const currentRes = await fetch(currentUrl);
                const currentData = await currentRes.json();

                const isDaytime = currentData.dt >= currentData.sys.sunrise && currentData.dt < currentData.sys.sunset;
                document.getElementById('current-emoji').textContent = getWeatherEmoji(currentData.weather[0].id, isDaytime);
                document.getElementById('current-temp').textContent = `${Math.round(currentData.main.temp)}°F`;
                document.getElementById('current-desc').textContent = currentData.weather[0].description;
                document.getElementById('current-loc').textContent = CITY_NAME;
                
                // Fetch Forecast
                const forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?lat=${LATITUDE}&lon=${LONGITUDE}&appid=${API_KEY}&units=${UNITS}`;
                const forecastRes = await fetch(forecastUrl);
                const forecastData = await forecastRes.json();

                const container = document.getElementById('forecast-container');
                container.innerHTML = '';
                
                // Get next 5 intervals (15 hours)
                const nextForecasts = forecastData.list.slice(0, 5);
                const tzOffset = forecastData.city.timezone;

                nextForecasts.forEach(item => {
                    const localTimestamp = (item.dt + tzOffset) * 1000;
                    const dateObj = new Date(localTimestamp);
                    
                    let hours = dateObj.getUTCHours();
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    hours = hours % 12 || 12;

                    const timeStr = `${hours} ${ampm}`;
                    const simpleIsDaytime = dateObj.getUTCHours() >= 6 && dateObj.getUTCHours() < 18;

                    const div = document.createElement('div');
                    div.className = 'forecast-item';
                    div.innerHTML = `
                        <div class="forecast-time">${timeStr}</div>
                        <div class="forecast-icon">${getWeatherEmoji(item.weather[0].id, simpleIsDaytime)}</div>
                        <div class="forecast-temp">${Math.round(item.main.temp)}°</div>
                    `;
                    container.appendChild(div);
                });
                
            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').textContent = "Error loading weather data.";
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchWeather();
            setInterval(fetchWeather, 600000); // 10 mins
        });
    </script>
</body>
</html>
