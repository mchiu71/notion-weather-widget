<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date & Time Widget</title>
    <style>
        /* Widget Container Styling */
        body {
            margin: 0; /* Remove default body margin */
            font-family: Arial, sans-serif;
            background: none; /* Transparent background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Full viewport height for centering */
        }
        .datetime-widget {
            background: linear-gradient(135deg, #4A90E2 0%, #5BBAFF 100%); /* A pleasant blue gradient */
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 250px;
            margin: 0; /* Remove margin, centering handled by body */
            line-height: 1.4;
            font-size: 1.1em;
        }

        .datetime-widget .date-display {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .datetime-widget .time-display {
            font-size: 1.8em;
            font-weight: bolder;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .datetime-widget .day-display {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <!-- This is your embeddable widget -->
    <div id="myDateTimeWidget" class="datetime-widget">
        <p id="widget-day" class="day-display"></p>
        <p id="widget-date" class="date-display"></p>
        <p id="widget-time" class="time-display"></p>
    </div>

    <script>
        const widgetDayElement = document.getElementById('widget-day');
        const widgetDateElement = document.getElementById('widget-date');
        const widgetTimeElement = document.getElementById('widget-time');

        // Function to update date and time
        function updateDateTime() {
            const now = new Date();
            const optionsDay = { weekday: 'long' };
            const optionsDate = { year: 'numeric', month: 'long', day: 'numeric' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };

            widgetDayElement.textContent = now.toLocaleDateString(undefined, optionsDay);
            widgetDateElement.textContent = now.toLocaleDateString(undefined, optionsDate);
            widgetTimeElement.textContent = now.toLocaleTimeString(undefined, optionsTime);
        }

        // Initialize and update
        document.addEventListener('DOMContentLoaded', () => {
            updateDateTime();
            setInterval(updateDateTime, 1000); // Update time every second
        });
    </script>
</body>
</html>
