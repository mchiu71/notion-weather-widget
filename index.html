<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date, Time & Weather Widget</title>
    <style>
        /* Widget Container Styling */
        body {
            margin: 0; /* Remove default body margin */
            font-family: Arial, sans-serif;
            background: none; /* Transparent background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Full viewport height for centering */
        }
        .weather-widget-container {
            display: flex;
            justify-content: space-between; /* Distribute space evenly */
            align-items: stretch; /* Stretch panes to equal height */
            background: linear-gradient(135deg, #4A90E2 0%, #5BBAFF 100%); /* A pleasant blue gradient */
            color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 650px; /* Adjusted max width for three panes */
            margin: 20px auto;
            line-height: 1.3;
        }

        .pane {
            flex: 1; /* Each pane takes equal width */
            padding: 10px;
            text-align: center;
            border-right: 1px solid rgba(255, 255, 255, 0.3); /* Separator */
            display: flex; /* Use flex for internal content alignment */
            flex-direction: column;
            justify-content: center; /* Center content vertically */
            min-width: 0; /* Allow shrinking */
        }

        .pane:last-child {
            border-right: none; /* No separator on the last pane */
        }

        .pane h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        /* Specific styles for elements */
        .time-display { font-size: 2.2em; font-weight: bolder; }
        .date-display { font-size: 1.0em; opacity: 0.9; margin-top: 5px; }

        .current-weather-pane #widget-city { font-size: 1.4em; font-weight: bold; margin-bottom: 5px; }
        .temp-display { font-size: 2.5em; font-weight: bold; margin: 5px 0;}
        .conditions-display { font-size: 1.1em; text-transform: capitalize; margin-bottom: 5px; }
        .high-low-display { font-size: 1.0em; opacity: 0.9; }

        .forecast-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left; /* Align forecast items left */
            font-size: 0.9em;
        }
        .forecast-item {
            display: flex;
            justify-content: space-between; /* Space out day and temp */
            margin-bottom: 5px;
        }
        .forecast-day { font-weight: bold; }
        .forecast-temp { margin-left: 10px; }

        .error-message {
            color: #ffdddd;
            background-color: #c0392b;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none; /* Hidden by default */
            width: 100%; /* Take full width */
            box-sizing: border-box; /* Include padding in width */
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- This is your embeddable widget -->
    <div class="weather-widget-container">
        <div class="pane time-date-pane">
            <p id="widget-time" class="time-display"></p>
            <p id="widget-date" class="date-display"></p>
        </div>
        <div class="pane current-weather-pane">
            <h3 id="widget-city">Loading...</h3>
            <p id="widget-current-temp" class="temp-display"></p>
            <p id="widget-conditions" class="conditions-display"></p>
            <p id="widget-high-low" class="high-low-display"></p>
        </div>
        <div class="pane forecast-pane">
            <h3>5-Day Forecast</h3>
            <div id="widget-forecast-list" class="forecast-list">
                <!-- Forecast items will go here -->
            </div>
        </div>
        <div id="weather-error" class="error-message"></div>
    </div>

    <script>
        const API_KEY = '1c47d4c7d6694de1731919721ad0d2a2';
        const LATITUDE = 37.2639; // Latitude for Saratoga, CA
        const LONGITUDE = -122.0233; // Longitude for Saratoga, CA
        const UNITS = 'imperial'; // Use 'imperial' for Fahrenheit

        const widgetDateElement = document.getElementById('widget-date');
        const widgetTimeElement = document.getElementById('widget-time');
        const widgetCityElement = document.getElementById('widget-city');
        const widgetCurrentTempElement = document.getElementById('widget-current-temp');
        const widgetConditionsElement = document.getElementById('widget-conditions');
        const widgetHighLowElement = document.getElementById('widget-high-low');
        const widgetForecastList = document.getElementById('widget-forecast-list');
        const weatherErrorElement = document.getElementById('weather-error');

        // Function to update date and time
        function updateDateTime() {
            const now = new Date();
            const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };

            widgetDateElement.textContent = now.toLocaleDateString(undefined, optionsDate);
            widgetTimeElement.textContent = now.toLocaleTimeString(undefined, optionsTime);
        }

        // Function to fetch current weather data
        async function fetchCurrentWeatherData(lat, lon) {
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=${UNITS}`;

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'API error for current weather.');
                }
                const data = await response.json();
                
                widgetCityElement.textContent = data.name;
                widgetCurrentTempElement.textContent = `${Math.round(data.main.temp)}°F`;
                widgetConditionsElement.textContent = data.weather[0].description;
                widgetHighLowElement.textContent = `H: ${Math.round(data.main.temp_max)}°F | L: ${Math.round(data.main.temp_min)}°F`;
                weatherErrorElement.style.display = 'none'; // Hide error if successful
            } catch (error) {
                console.error("Failed to fetch current weather data:", error);
                widgetCityElement.textContent = 'Saratoga, CA'; // Keep fixed city name
                widgetCurrentTempElement.textContent = '--°F';
                widgetConditionsElement.textContent = 'N/A';
                widgetHighLowElement.textContent = 'H:--°F | L:--°F';
                weatherErrorElement.textContent = `Error: ${error.message}`;
                weatherErrorElement.style.display = 'block';
            }
        }

        // Function to fetch 5-day forecast data
        async function fetchForecastData(lat, lon) {
            const url = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=${UNITS}`;

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'API error for forecast.');
                }
                const data = await response.json();
                
                // Process 5-day / 3-hour forecast to get daily high temperatures
                const dailyForecasts = {}; // { 'YYYY-MM-DD': { max_temp: X, day: 'Mon' } }
                const today = new Date();
                today.setHours(0, 0, 0, 0); // Normalize today to start of day

                data.list.forEach(item => {
                    const date = new Date(item.dt * 1000); // Convert timestamp to Date object
                    date.setHours(0, 0, 0, 0); // Normalize to start of day for comparison

                    const dateKey = date.toISOString().split('T')[0];
                    const dayName = date.toLocaleDateString(undefined, { weekday: 'short' });

                    if (!dailyForecasts[dateKey]) {
                        dailyForecasts[dateKey] = { max_temp: -Infinity, day: dayName };
                    }
                    dailyForecasts[dateKey].max_temp = Math.max(dailyForecasts[dateKey].max_temp, item.main.temp_max);
                });

                // Convert to array and sort by date
                const sortedDailyForecasts = Object.keys(dailyForecasts)
                    .sort()
                    .map(key => dailyForecasts[key]);

                // Clear previous forecasts
                widgetForecastList.innerHTML = '';

                // Display up to 5 days, starting from today
                let displayedDays = 0;
                for (const forecast of sortedDailyForecasts) {
                    if (displayedDays < 5) {
                        const listItem = document.createElement('div');
                        listItem.className = 'forecast-item';
                        listItem.innerHTML = `
                            <span class="forecast-day">${forecast.day}</span>
                            <span class="forecast-temp">${Math.round(forecast.max_temp)}°F</span>
                        `;
                        widgetForecastList.appendChild(listItem);
                        displayedDays++;
                    }
                }
            } catch (error) {
                console.error("Failed to fetch forecast data:", error);
                widgetForecastList.innerHTML = '<div class="error-message" style="display:block;">Forecast Error</div>';
            }
        }

        // Initialize and update
        document.addEventListener('DOMContentLoaded', () => {
            updateDateTime();
            setInterval(updateDateTime, 1000); // Update time every second

            fetchCurrentWeatherData(LATITUDE, LONGITUDE);
            fetchForecastData(LATITUDE, LONGITUDE);
            setInterval(() => {
                fetchCurrentWeatherData(LATITUDE, LONGITUDE);
                fetchForecastData(LATITUDE, LONGITUDE);
            }, 600000); // Update weather every 10 minutes (600000 ms)
        });
    </script>
</body>
</html>
