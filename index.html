<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date, Time & 5-Day Weather Widget</title>
    <style>
       html, body {
           margin: 0;
           padding: 0;
           background: transparent !important;
           font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
           display: flex;
           justify-content: center;
           align-items: center;
           min-height: 100vh;
        }
        .weather-widget-container {
            display: flex;
            background: linear-gradient(135deg, #4A90E2 0%, #5BBAFF 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1800px; /* Wider max-width */
            margin: 20px auto;
            line-height: 1.4;
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
        }

        .pane {
            padding: 10px 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 120px;
        }
        .pane:last-child { border-right: none; }

        .time-date-pane {
            flex: 0 0 180px;
        }
        .time-display { font-size: 2.5em; font-weight: bolder; margin-bottom: 0px; }
        .date-display { font-size: 0.9em; opacity: 0.9; margin-top: 0px; }

        .current-weather-pane {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .weather-emoji-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8em;
            opacity: 0.2;
            z-index: 0;
            line-height: 1;
        }
        .weather-text-overlay {
            position: relative;
            z-index: 1;
            text-shadow: 0 0 3px rgba(0,0,0,0.5);
        }
        #widget-city { font-size: 1.5em; font-weight: bold; margin-bottom: 5px; }
        .temp-display { font-size: 3em; font-weight: bold; margin: 0px 0 5px 0;}
        .conditions-display { font-size: 1.1em; text-transform: capitalize; margin-bottom: 5px; }
        .high-low-display { font-size: 0.9em; opacity: 0.9; }

        .forecast-pane {
            flex: 3; /* More room for forecast */
            min-width: 380px;
        }
        .forecast-pane h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        .forecast-horizontal-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 5px;
            padding-top: 5px;
        }
        .forecast-day-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 10px;
            flex-shrink: 0;
        }
        .vertical-separator {
            width: 1px;
            background-color: rgba(255, 255, 255, 0.2);
            align-self: stretch;
            margin: 0 5px;
            flex-shrink: 0;
        }
        .forecast-day-abbr { font-weight: bold; font-size: 0.9em; margin-bottom: 3px; }
        .forecast-emoji { font-size: 2.2em; margin: 3px 0; line-height: 1; }
        .forecast-temps { font-size: 0.85em; line-height: 1.4; }
        .forecast-high { font-weight: bold; }
        .forecast-low { opacity: 0.8; }

        .error-message {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffdddd;
            background-color: #c0392b;
            padding: 8px 15px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
            width: calc(100% - 30px);
            box-sizing: border-box;
            text-align: center;
            font-size: 0.85em;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="weather-widget-container">
        <!-- Pane 1: Time & Date -->
        <div class="pane time-date-pane">
            <p id="widget-time" class="time-display"></p>
            <p id="widget-date" class="date-display"></p>
        </div>

        <!-- Pane 2: Current Weather -->
        <div class="pane current-weather-pane">
            <div class="weather-emoji-bg" id="widget-current-emoji-bg"></div>
            <div class="weather-text-overlay">
                <h3 id="widget-city">Saratoga, CA</h3>
                <p id="widget-current-temp" class="temp-display"></p>
                <p id="widget-conditions" class="conditions-display"></p>
                <p id="widget-high-low" class="high-low-display"></p>
            </div>
        </div>

        <!-- Pane 3: 5-Day Forecast -->
        <div class="pane forecast-pane">
            <h3>5-Day Forecast</h3>
            <div id="widget-forecast-horizontal-container" class="forecast-horizontal-container">
                <!-- Forecast items will go here -->
            </div>
        </div>

        <div id="weather-error" class="error-message"></div>
    </div>

    <script>
        const API_KEY = '1c47d4c7d6694de1731919721ad0d2a2';
        const LATITUDE = 37.2639;
        const LONGITUDE = -122.0233;
        const UNITS = 'imperial';

        const widgetDateElement = document.getElementById('widget-date');
        const widgetTimeElement = document.getElementById('widget-time');
        const widgetCityElement = document.getElementById('widget-city');
        const widgetCurrentTempElement = document.getElementById('widget-current-temp');
        const widgetConditionsElement = document.getElementById('widget-conditions');
        const widgetHighLowElement = document.getElementById('widget-high-low');
        const widgetCurrentEmojiBg = document.getElementById('widget-current-emoji-bg');
        const widgetForecastHorizontalContainer = document.getElementById('widget-forecast-horizontal-container');
        const weatherErrorElement = document.getElementById('weather-error');

        function getWeatherEmoji(weatherId, isDaytime) {
            if (weatherId >= 200 && weatherId < 300) return '\u26C8\uFE0F';
            if (weatherId >= 300 && weatherId < 400) return '\uD83C\uDF27\uFE0F';
            if (weatherId >= 500 && weatherId < 600) return '\uD83C\uDF27\uFE0F';
            if (weatherId >= 600 && weatherId < 700) return '\u2744\uFE0F';
            if (weatherId >= 700 && weatherId < 800) return '\uD83C\uDF2B\uFE0F';
            if (weatherId === 800) return isDaytime ? '\u2600\uFE0F' : '\uD83C\uDF19';
            if (weatherId === 801) return '\uD83C\uDF24\uFE0F';
            if (weatherId === 802) return '\uD83C\uDF25\uFE0F';
            if (weatherId === 803 || weatherId === 804) return '\u2601\uFE0F';
            return '\u2753';
        }

        function updateDateTime() {
            const now = new Date();
            const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            widgetDateElement.textContent = now.toLocaleDateString(undefined, optionsDate);
            widgetTimeElement.textContent = now.toLocaleTimeString(undefined, optionsTime);
        }

        async function fetchCurrentWeatherData(lat, lon) {
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=${UNITS}`;
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'API error for current weather.');
                }
                const data = await response.json();

                const timezoneOffset = data.timezone;
                const localCurrentTime = data.dt + timezoneOffset;
                const localSunriseTime = data.sys.sunrise + timezoneOffset;
                const localSunsetTime = data.sys.sunset + timezoneOffset;
                const isDaytime = (localCurrentTime >= localSunriseTime && localCurrentTime < localSunsetTime);

                widgetCurrentEmojiBg.textContent = getWeatherEmoji(data.weather[0].id, isDaytime);
                widgetCityElement.textContent = 'Saratoga, CA';
                widgetCurrentTempElement.textContent = `${Math.round(data.main.temp)}°F`;
                widgetConditionsElement.textContent = data.weather[0].description;
                widgetHighLowElement.textContent = `H: ${Math.round(data.main.temp_max)}°F | L: ${Math.round(data.main.temp_min)}°F`;
                weatherErrorElement.style.display = 'none';
            } catch (error) {
                console.error("Failed to fetch current weather data:", error);
                widgetCurrentEmojiBg.textContent = '❓';
                widgetCityElement.textContent = 'Saratoga, CA';
                widgetCurrentTempElement.textContent = '--°F';
                widgetConditionsElement.textContent = 'N/A';
                widgetHighLowElement.textContent = 'H:--°F | L:--°F';
                weatherErrorElement.textContent = `Error: ${error.message}`;
                weatherErrorElement.style.display = 'block';
            }
        }

        async function fetchForecastData(lat, lon) {
            const url = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=${UNITS}`;
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'API error for forecast.');
                }
                const data = await response.json();

                // FIX: Use the city's UTC offset from the API response to compute
                // the correct local date string, instead of relying on the browser's
                // timezone. This prevents duplicate day names when the browser timezone
                // differs from the widget's location (e.g., inside a Notion iframe).
                const cityTimezoneOffsetSeconds = data.city.timezone;

                const dailyForecasts = {};

                data.list.forEach(item => {
                    // Compute local timestamp for Saratoga using city's UTC offset
                    const localTimestamp = (item.dt + cityTimezoneOffsetSeconds) * 1000;
                    const localDate = new Date(localTimestamp);

                    // Build a date key using UTC methods on the shifted timestamp
                    // (since we've already added the offset, UTC getters give local values)
                    const year = localDate.getUTCFullYear();
                    const month = String(localDate.getUTCMonth() + 1).padStart(2, '0');
                    const day = String(localDate.getUTCDate()).padStart(2, '0');
                    const dateKey = `${year}-${month}-${day}`;

                    // Get day abbreviation from the correct local day-of-week
                    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                    const dayName = dayNames[localDate.getUTCDay()];

                    if (!dailyForecasts[dateKey]) {
                        dailyForecasts[dateKey] = {
                            max_temp: -Infinity,
                            min_temp: Infinity,
                            day: dayName,
                            weatherId: item.weather[0].id
                        };
                    }
                    dailyForecasts[dateKey].max_temp = Math.max(dailyForecasts[dateKey].max_temp, item.main.temp_max);
                    dailyForecasts[dateKey].min_temp = Math.min(dailyForecasts[dateKey].min_temp, item.main.temp_min);
                    if (item.weather[0].id !== 800 && item.weather[0].id > dailyForecasts[dateKey].weatherId) {
                        dailyForecasts[dateKey].weatherId = item.weather[0].id;
                    }
                });

                // Skip today, show next 5 days
                const today = (() => {
                    const now = new Date((Date.now() / 1000 + cityTimezoneOffsetSeconds) * 1000);
                    const y = now.getUTCFullYear();
                    const m = String(now.getUTCMonth() + 1).padStart(2, '0');
                    const d = String(now.getUTCDate()).padStart(2, '0');
                    return `${y}-${m}-${d}`;
                })();

                const sortedDailyForecasts = Object.keys(dailyForecasts)
                    .sort()
                    .filter(key => key > today)  // Exclude today — forecast days only
                    .slice(0, 5)
                    .map(key => dailyForecasts[key]);

                widgetForecastHorizontalContainer.innerHTML = '';

                sortedDailyForecasts.forEach((forecast, index) => {
                    const listItem = document.createElement('div');
                    listItem.className = 'forecast-day-item';
                    listItem.innerHTML = `
                        <span class="forecast-day-abbr">${forecast.day}</span>
                        <span class="forecast-emoji">${getWeatherEmoji(forecast.weatherId, true)}</span>
                        <span class="forecast-temps">
                            <span class="forecast-high">H:${Math.round(forecast.max_temp)}°F</span><br>
                            <span class="forecast-low">L:${Math.round(forecast.min_temp)}°F</span>
                        </span>
                    `;
                    widgetForecastHorizontalContainer.appendChild(listItem);

                    if (index < sortedDailyForecasts.length - 1) {
                        const separator = document.createElement('div');
                        separator.className = 'vertical-separator';
                        widgetForecastHorizontalContainer.appendChild(separator);
                    }
                });

                weatherErrorElement.style.display = 'none';
            } catch (error) {
                console.error("Failed to fetch forecast data:", error);
                widgetForecastHorizontalContainer.innerHTML = '<div class="error-message" style="display:block;">Forecast Error</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateDateTime();
            setInterval(updateDateTime, 1000);
            fetchCurrentWeatherData(LATITUDE, LONGITUDE);
            fetchForecastData(LATITUDE, LONGITUDE);
            setInterval(() => {
                fetchCurrentWeatherData(LATITUDE, LONGITUDE);
                fetchForecastData(LATITUDE, LONGITUDE);
            }, 600000);
        });
    </script>
</body>
</html>
